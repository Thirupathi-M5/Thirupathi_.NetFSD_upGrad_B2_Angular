<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Landing Page</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 🔹 Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand" href="#">TechStore</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>

  </div>
</nav>

<!-- 🔹 Offcanvas Menu -->
<div class="offcanvas offcanvas-start" id="menu">
  <div class="offcanvas-header">
    <h5>Menu</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="list-group">
      <li class="list-group-item">Home</li>
      <li class="list-group-item">Products</li>
      <li class="list-group-item">Cart</li>
    </ul>
  </div>
</div>

<!-- 🔹 Hero Section -->
<div class="container text-center mt-5">
  <h1 class="mb-3">Welcome to TechStore</h1>
  <p class="lead">Best gadgets at affordable prices</p>
  <button class="btn btn-primary">Shop Now</button>
</div>

<!-- 🔹 Carousel -->
<div class="container mt-5">

  <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="earphone.jpg" class="d-block w-100 ">
      </div>

      <div class="carousel-item">
        <img src="samsung-memor.jpg" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="laptops.jpg" class="d-block w-100">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

</div>

<!-- 🔹 Product Grid -->
<div class="container mt-5">

  <h2 class="text-center mb-4">Featured Products</h2>

  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 text-center p-2">
        <img src="./laptop.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Laptop</h5>
          <p>₹50,000</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 text-center p-2">
        <img src="./phone.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Mobile</h5>
          <p>₹20,000</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 text-center p-2">
        <img src="./headphone2.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Headphones</h5>
          <p>₹2,000</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 text-center p-2">
        <img src="./watch.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Smart Watch</h5>
          <p>₹5,000</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- 🔹 Newsletter Form -->
<div class="container mt-5 text-center">

  <h3 class="mb-3">Subscribe to our Newsletter</h3>

  <form class="row justify-content-center">

    <div class="col-md-6 mb-2">
      <input type="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="col-md-2">
      <button class="btn btn-success w-100">Subscribe</button>
    </div>

  </form>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
