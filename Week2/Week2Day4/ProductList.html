<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electronics Store</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

  <h2 class="text-center mb-4">Electronics Store</h2>

  <div class="row g-4">

    <!-- Product 1 -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100">
        <img src="laptop.jpg" class="card-img-top" alt="Laptop">
        <div class="card-body text-center">
          <h5 class="card-title">Laptop</h5>
          <p class="card-text">₹50,000</p>
          <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100">
        <img src="phone.jpg" class="card-img-top" alt="Mobile">
        <div class="card-body text-center">
          <h5 class="card-title">Mobile</h5>
          <p class="card-text">₹20,000</p>
          <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100">
        <img src="headphone2.jpg" class="card-img-top" alt="Headphones">
        <div class="card-body text-center">
          <h5 class="card-title">Headphones</h5>
          <p class="card-text">₹2,000</p>
          <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100">
        <img src="watch.jpg" class="card-img-top" alt="Smart Watch">
        <div class="card-body text-center">
          <h5 class="card-title">Smart Watch</h5>
          <p class="card-text">₹5,000</p>
          <button class="btn btn-primary btn-sm me-2">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
