<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Event Dashboard</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Add Event</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🔹 Dashboard Layout -->
<div class="container mt-4">

  <div class="row g-4">

    <!-- Event List -->
    <div class="col-12 col-lg-8">
      <div class="card p-3">
        <h4 class="mb-3">Upcoming Events</h4>

        <div class="table-responsive">
          <table class="table table-striped table-bordered text-center">
            <thead class="table-dark">
              <tr>
                <th>Event Name</th>
                <th>Date</th>
                <th>Department</th>
              </tr>
            </thead>
            <tbody>
              <tr><td>Tech Fest</td><td>10 Oct</td><td>CSE</td></tr>
              <tr><td>Cultural Day</td><td>15 Oct</td><td>Arts</td></tr>
              <tr><td>Sports Meet</td><td>20 Oct</td><td>Sports</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <!-- Add Event Button Section -->
    <div class="col-12 col-lg-4">
      <div class="card p-3 text-center">
        <h4 class="mb-3">Manage Events</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
          Add New Event
        </button>
      </div>
    </div>

  </div>

</div>

<!-- 🔹 Modal for Adding Event -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form>

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Department</label>
            <input type="text" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Save Event</button>

        </form>

      </div>

    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
